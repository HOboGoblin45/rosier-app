<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rosier App Store Screenshot - Dresser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://rsms.me/inter/inter.css');

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .header {
            text-align: center;
            margin-top: 20px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 16px;
            color: #6b6b6b;
            font-weight: 400;
            line-height: 1.5;
        }

        /* iPhone Frame */
        .iphone-frame {
            position: relative;
            width: 412px;
            height: 915px;
            background: #000;
            border-radius: 60px;
            padding: 14px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .iphone-frame::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 28px;
            background: #000;
            border-radius: 0 0 40px 40px;
            z-index: 10;
        }

        .screen-content {
            width: 100%;
            height: 100%;
            background: #f5f5f5;
            border-radius: 50px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .status-bar {
            height: 44px;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            font-size: 14px;
            color: #1a1a1a;
            font-weight: 600;
        }

        .header-section {
            padding: 16px;
            border-bottom: 1px solid #e8e8e8;
        }

        .title {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a1a;
        }

        .tabs {
            display: flex;
            gap: 16px;
            padding: 16px;
            border-bottom: 1px solid #e8e8e8;
            overflow-x: auto;
        }

        .tab {
            font-size: 14px;
            color: #9b9b9b;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            padding-bottom: 8px;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab.active {
            color: #1a1a1a;
            border-bottom-color: #c4a77d;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .item-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .item-thumbnail {
            aspect-ratio: 1;
            border-radius: 12px;
            background: linear-gradient(135deg, #e8dcc8 0%, #d4b98d 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            overflow: hidden;
        }

        .item-thumbnail.with-badge::after {
            content: '🔥';
            position: absolute;
            top: 4px;
            right: 4px;
            font-size: 18px;
            background: rgba(255, 255, 255, 0.95);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .summer-section {
            margin-bottom: 24px;
        }

        .section-label {
            font-size: 13px;
            color: #c4a77d;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            padding: 0 4px;
        }

        .drawer-items {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Save what you love</h1>
            <p>Organize favorites into themed drawers</p>
        </div>

        <div class="iphone-frame">
            <div class="screen-content">
                <div class="status-bar">
                    <span>9:41</span>
                    <span>●●●●●</span>
                </div>

                <div class="header-section">
                    <div class="title">My Dresser</div>
                </div>

                <div class="tabs">
                    <div class="tab active">Summer (8)</div>
                    <div class="tab">Want List (5)</div>
                    <div class="tab">Saved</div>
                </div>

                <div class="content">
                    <div class="summer-section">
                        <div class="drawer-items">
                            <div class="item-thumbnail">👗</div>
                            <div class="item-thumbnail">👠</div>
                            <div class="item-thumbnail">👜</div>
                            <div class="item-thumbnail">🕶️</div>
                            <div class="item-thumbnail">👒</div>
                            <div class="item-thumbnail with-badge">🧥</div>
                            <div class="item-thumbnail">👔</div>
                            <div class="item-thumbnail">💍</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
