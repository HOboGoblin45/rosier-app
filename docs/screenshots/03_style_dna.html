<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rosier App Store Screenshot - Style DNA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://rsms.me/inter/inter.css');

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .header {
            text-align: center;
            margin-top: 20px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 16px;
            color: #6b6b6b;
            font-weight: 400;
            line-height: 1.5;
        }

        /* iPhone Frame */
        .iphone-frame {
            position: relative;
            width: 412px;
            height: 915px;
            background: #000;
            border-radius: 60px;
            padding: 14px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .iphone-frame::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 28px;
            background: #000;
            border-radius: 0 0 40px 40px;
            z-index: 10;
        }

        .screen-content {
            width: 100%;
            height: 100%;
            background: #f5f5f5;
            border-radius: 50px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .status-bar {
            height: 44px;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            font-size: 14px;
            color: #1a1a1a;
            font-weight: 600;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow-y: auto;
        }

        .nav-bar {
            padding: 16px 0;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
            border-bottom: 1px solid #e8e8e8;
            width: 100%;
            margin-bottom: 16px;
        }

        .dna-card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 320px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        .dna-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .dna-badge {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #c4a77d 0%, #d4b98d 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
        }

        .dna-title {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a1a;
        }

        .dna-section {
            margin-bottom: 20px;
        }

        .dna-label {
            font-size: 11px;
            color: #c4a77d;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .dna-archetype {
            font-size: 16px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 12px;
        }

        .brands-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .brand-tag {
            background: #f0ebe3;
            color: #1a1a1a;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .color-swatches {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .swatch {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .swatch.taupe {
            background: #a89968;
        }

        .swatch.cream {
            background: #e8dcc8;
        }

        .swatch.chocolate {
            background: #6b5a47;
        }

        .swatch.gold {
            background: #c4a77d;
        }

        .swatch.white {
            background: #f5f5f5;
            border: 1px solid #d0d0d0;
        }

        .stats {
            display: flex;
            gap: 12px;
            padding-top: 12px;
            border-top: 1px solid #e8e8e8;
        }

        .stat {
            flex: 1;
            text-align: center;
        }

        .stat-number {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a1a;
        }

        .stat-label {
            font-size: 11px;
            color: #9b9b9b;
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Your Style DNA</h1>
            <p>AI learns your taste with every swipe</p>
        </div>

        <div class="iphone-frame">
            <div class="screen-content">
                <div class="status-bar">
                    <span>9:41</span>
                    <span>●●●●●</span>
                </div>

                <div class="content">
                    <div class="nav-bar">Profile</div>

                    <div class="dna-card">
                        <div class="dna-header">
                            <div class="dna-badge">✦</div>
                            <div class="dna-title">Style DNA</div>
                        </div>

                        <div class="dna-section">
                            <div class="dna-label">Your Archetype</div>
                            <div class="dna-archetype">Minimalist with Edge</div>
                        </div>

                        <div class="dna-section">
                            <div class="dna-label">Top Brands</div>
                            <div class="brands-list">
                                <div class="brand-tag">Lemaire</div>
                                <div class="brand-tag">Khaite</div>
                                <div class="brand-tag">The Row</div>
                                <div class="brand-tag">Baserange</div>
                                <div class="brand-tag">Sandy Liang</div>
                            </div>
                        </div>

                        <div class="dna-section">
                            <div class="dna-label">Color Palette</div>
                            <div class="color-swatches">
                                <div class="swatch taupe"></div>
                                <div class="swatch cream"></div>
                                <div class="swatch chocolate"></div>
                                <div class="swatch gold"></div>
                                <div class="swatch white"></div>
                            </div>
                        </div>

                        <div class="dna-section">
                            <div class="dna-label">Price Range</div>
                            <div style="font-size: 16px; font-weight: 700; color: #1a1a1a;">$150 – $450</div>
                        </div>

                        <div class="stats">
                            <div class="stat">
                                <div class="stat-number">847</div>
                                <div class="stat-label">Swipes</div>
                            </div>
                            <div class="stat">
                                <div class="stat-number">142</div>
                                <div class="stat-label">Saves</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
