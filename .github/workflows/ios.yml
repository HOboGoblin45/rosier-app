name: iOS CI/CD

on:
  push:
    branches: [main, develop]
    paths: ['ios/**']
  pull_request:
    branches: [develop]
    paths: ['ios/**']
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - testflight
          - appstore
  create:
    tags:
      - 'v*'

env:
  PROJECT_PATH: ios/Rosier
  XCODE_VERSION: '16.0'
  IOS_DEPLOYMENT_TARGET: '17.0'
  SWIFT_VERSION: '5.9'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-14
    continue-on-error: true
    timeout-minutes: 60
    defaults:
      run:
        working-directory: ios/Rosier

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: |
          # Find latest available Xcode 16.x, fall back to default
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          fi
          echo "Using Xcode at: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Cellar
          key: ${{ runner.os }}-brew-${{ hashFiles('**/Brewfile.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-brew-

      - name: Install dependencies
        run: |
          brew install xcodegen swiftlint
          gem install xcpretty

      - name: Generate Xcode project
        run: |
          ./scripts/generate_xcodeproj.sh --verbose

      - name: Run SwiftLint
        run: |
          swiftlint lint --strict --reporter github-actions-logging Sources/

      - name: Build for simulator
        run: |
          xcodebuild build \
            -project Rosier.xcodeproj \
            -scheme Rosier \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty --color --report html --output build/logs/build.html

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project Rosier.xcodeproj \
            -scheme Rosier \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -derivedDataPath build/DerivedData \
            -resultBundlePath build/test-results.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty --color --report html --output build/logs/tests.html

      - name: Process test results
        if: always()
        run: |
          xcrun xccov view --report --json build/test-results.xcresult > build/coverage.json || true
          echo "Test Results Summary:"
          tail -20 build/logs/tests.html || echo "Test log unavailable"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            ios/Rosier/build/test-results.xcresult
            ios/Rosier/build/coverage.json
          retention-days: 30

      - name: Upload coverage reports
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./ios/Rosier/build/coverage.json
          flags: ios-unit-tests
          name: iOS Coverage
          fail_ci_if_error: false

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ios/Rosier/build/logs/
          retention-days: 7

  snapshot-tests:
    name: Snapshot Tests
    runs-on: macos-14
    needs: build-and-test
    if: always()
    continue-on-error: true
    timeout-minutes: 45
    defaults:
      run:
        working-directory: ios/Rosier

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1 || ls -d /Applications/Xcode*.app | sort -V | tail -1)
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Install dependencies
        run: |
          brew install xcodegen
          gem install xcpretty

      - name: Generate Xcode project
        run: ./scripts/generate_xcodeproj.sh

      - name: Run snapshot tests
        run: |
          xcodebuild test \
            -project Rosier.xcodeproj \
            -scheme RosierSnapshotTests \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty --color

      - name: Upload snapshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-diffs
          path: ios/Rosier/Tests/RosierTests/__Snapshots__/
          retention-days: 7

  deploy-testflight:
    name: Deploy to TestFlight
    runs-on: macos-14
    needs: [build-and-test, snapshot-tests]
    timeout-minutes: 90
    if: startsWith(github.ref, 'refs/tags/v')
    defaults:
      run:
        working-directory: ios/Rosier

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1 || ls -d /Applications/Xcode*.app | sort -V | tail -1)
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Install dependencies
        run: |
          brew install xcodegen fastlane
          gem install xcpretty
          gem install fastlane -NV
          fastlane --version

      - name: Generate Xcode project
        run: ./scripts/generate_xcodeproj.sh

      - name: Setup signing and provisioning
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail

          # --- 1. Create keychain and import certificate ---
          KEYCHAIN_NAME="rosier-ci-keychain"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          security delete-keychain "$KEYCHAIN_NAME" 2>/dev/null || true
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_NAME"
          security list-keychains -s "$KEYCHAIN_NAME" $(security list-keychains | sed s/\"//g)

          # Decode and import certificate
          CERT_DIR=$(mktemp -d)
          echo "$IOS_CERTIFICATE_BASE64" | base64 --decode > "$CERT_DIR/cert.p12"

          # Re-encode P12 for macOS compatibility (OpenSSL 3.x → legacy format)
          if openssl pkcs12 -in "$CERT_DIR/cert.p12" -out "$CERT_DIR/cert.pem" -nodes -passin pass:"$IOS_CERT_PASSWORD" 2>/dev/null; then
            openssl pkcs12 -export -in "$CERT_DIR/cert.pem" -out "$CERT_DIR/cert_legacy.p12" \
              -passout pass:"$IOS_CERT_PASSWORD" -legacy 2>/dev/null || \
            openssl pkcs12 -export -in "$CERT_DIR/cert.pem" -out "$CERT_DIR/cert_legacy.p12" \
              -passout pass:"$IOS_CERT_PASSWORD" -certpbe PBE-SHA1-3DES -keypbe PBE-SHA1-3DES -macalg SHA1 2>/dev/null || \
            cp "$CERT_DIR/cert.p12" "$CERT_DIR/cert_legacy.p12"
            rm -f "$CERT_DIR/cert.pem"
            CERT_FILE="$CERT_DIR/cert_legacy.p12"
          else
            CERT_FILE="$CERT_DIR/cert.p12"
          fi

          security import "$CERT_FILE" -k "$KEYCHAIN_NAME" -P "$IOS_CERT_PASSWORD" -A
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          echo "Certificate imported:"
          security find-identity -v -p codesigning "$KEYCHAIN_NAME"

          # --- 2. Write API key for Fastlane and xcodebuild ---
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_API_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8

          cat > /tmp/api_key.json << APIEOF
          {
            "key_id": "$APP_STORE_CONNECT_API_KEY_ID",
            "issuer_id": "$APP_STORE_CONNECT_API_ISSUER_ID",
            "key": $(python3 -c "import json; print(json.dumps(open('/Users/runner/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8').read()))"),
            "in_house": false
          }
          APIEOF

          # --- 3. Download provisioning profile from Apple using Fastlane sigh ---
          echo "Downloading provisioning profile from Apple..."
          fastlane sigh \
            --app_identifier "com.rosier.app" \
            --api_key_path /tmp/api_key.json \
            --force \
            --platform ios \
            --readonly false 2>&1 || {
            echo "sigh failed, trying with --adhoc false..."
            fastlane sigh download_all \
              --api_key_path /tmp/api_key.json 2>&1 || true
          }

          # Verify profile installed
          echo "=== Installed profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || echo "No profiles dir"

          # Extract profile name for xcodebuild
          PROFILE_PATH=$(ls -t ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | head -1)
          if [ -n "$PROFILE_PATH" ]; then
            PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" 2>/dev/null | plutil -extract UUID raw - 2>/dev/null || true)
            PROFILE_NAME=$(security cms -D -i "$PROFILE_PATH" 2>/dev/null | plutil -extract Name raw - 2>/dev/null || true)
            echo "Profile UUID: $PROFILE_UUID"
            echo "Profile Name: $PROFILE_NAME"
            echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV
            echo "PROFILE_NAME=$PROFILE_NAME" >> $GITHUB_ENV
          else
            echo "WARNING: No provisioning profile found!"
          fi

          rm -rf "$CERT_DIR"

      - name: Build archive
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          # Use Manual signing with the downloaded profile
          PROFILE_SPEC="${PROFILE_NAME:-}"
          echo "Using provisioning profile: $PROFILE_SPEC"

          xcodebuild archive \
            -project Rosier.xcodeproj \
            -scheme Rosier \
            -configuration Release \
            -archivePath build/Rosier.xcarchive \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_API_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_API_ISSUER_ID" \
            DEVELOPMENT_TEAM='${{ secrets.APPLE_DEVELOPER_ID }}' \
            CODE_SIGN_IDENTITY='Apple Distribution' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_SPEC"

          echo '=== Archive contents ==='
          ls -la build/Rosier.xcarchive/ 2>/dev/null || echo 'Archive not found'
          ls -la build/Rosier.xcarchive/Products/Applications/ 2>/dev/null || echo 'No apps in archive'

      - name: Export IPA
        run: |
          cat > build/ExportOptions.plist << EXPEOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>teamID</key>
              <string>${{ secrets.APPLE_DEVELOPER_ID }}</string>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.rosier.app</key>
                  <string>${PROFILE_NAME}</string>
              </dict>
          </dict>
          </plist>
          EXPEOF

          xcodebuild -exportArchive \
            -archivePath build/Rosier.xcarchive \
            -exportOptionsPlist build/ExportOptions.plist \
            -exportPath build/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8 \
            -authenticationKeyID '${{ secrets.APP_STORE_CONNECT_KEY_ID }}' \
            -authenticationKeyIssuerID '${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}'

          echo '=== Export contents ==='
          ls -laR build/export/ 2>/dev/null || echo 'Export dir not found'

      - name: Verify IPA
        run: |
          echo "=== Searching for IPA ==="
          find build -name "*.ipa" -type f 2>/dev/null || true
          echo "=== Build export directory ==="
          ls -laR build/export/ 2>/dev/null || echo "build/export/ not found"
          echo "=== Build directory top level ==="
          ls -la build/ 2>/dev/null || true

          # Find the IPA wherever it is
          IPA_PATH=$(find build -name "*.ipa" -type f 2>/dev/null | head -1)
          if [[ -z "$IPA_PATH" ]]; then
            echo "ERROR: No IPA found anywhere in build/"
            exit 1
          fi

          echo "Found IPA at: $IPA_PATH"
          echo "IPA size: $(du -h "$IPA_PATH" | cut -f1)"

          # Move to expected location if needed
          if [[ "$IPA_PATH" != "build/export/Rosier.ipa" ]]; then
            mkdir -p build/export
            cp "$IPA_PATH" build/export/Rosier.ipa
            echo "Copied IPA to build/export/Rosier.ipa"
          fi

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          fastlane beta \
            api_key_id:"$APP_STORE_CONNECT_API_KEY_ID" \
            api_issuer_id:"$APP_STORE_CONNECT_API_ISSUER_ID" \
            api_key_content:"$APP_STORE_CONNECT_API_KEY" \
            ipa:"build/export/Rosier.ipa"

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testflight-build
          path: |
            ios/Rosier/build/export/Rosier.ipa
            ios/Rosier/build/Rosier.xcarchive
          retention-days: 30

  deploy-app-store:
    name: Deploy to App Store
    runs-on: macos-14
    timeout-minutes: 120
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'appstore'
    defaults:
      run:
        working-directory: ios/Rosier

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1 || ls -d /Applications/Xcode*.app | sort -V | tail -1)
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Install dependencies
        run: |
          brew install xcodegen fastlane
          gem install xcpretty
          gem install fastlane -NV

      - name: Generate Xcode project
        run: ./scripts/generate_xcodeproj.sh

      - name: Setup code signing
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: ./scripts/setup_signing.sh appstore

      - name: Verify tests pass
        run: |
          xcodebuild test \
            -project Rosier.xcodeproj \
            -scheme Rosier \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty --color

      - name: Increment version
        run: |
          VERSION=$(grep 'MARKETING_VERSION' Sources/App/BUILD_SETTINGS.xcconfig | awk '{print $3}')
          BUILD=$(grep 'CURRENT_PROJECT_VERSION' Sources/App/BUILD_SETTINGS.xcconfig | awk '{print $3}')
          NEW_BUILD=$((BUILD + 1))
          sed -i '' "s/CURRENT_PROJECT_VERSION = .*/CURRENT_PROJECT_VERSION = $NEW_BUILD/" Sources/App/BUILD_SETTINGS.xcconfig
          echo "Incremented build from $BUILD to $NEW_BUILD"

      - name: Setup API key for signing
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_API_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8
          echo "API key written for key ID: $APP_STORE_CONNECT_API_KEY_ID"

      - name: Build archive
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild archive \
            -project Rosier.xcodeproj \
            -scheme Rosier \
            -configuration Release \
            -archivePath build/Rosier.xcarchive \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_API_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_API_ISSUER_ID" \
            DEVELOPMENT_TEAM='${{ secrets.APPLE_DEVELOPER_ID }}' \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES

          echo '=== Archive contents ==='
          ls -la build/Rosier.xcarchive/ 2>/dev/null || echo 'Archive not found'
          ls -la build/Rosier.xcarchive/Products/Applications/ 2>/dev/null || echo 'No apps in archive'

      - name: Export IPA
        run: |
          cat > build/ExportOptions.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>teamID</key>
              <string>${{ secrets.APPLE_DEVELOPER_ID }}</string>
              <key>destinationGenericPlatformName</key>
              <string>ios</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/Rosier.xcarchive \
            -exportOptionsPlist build/ExportOptions.plist \
            -exportPath build/export \
            | xcpretty --color

      - name: Submit to App Store
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          fastlane release \
            api_key_id:"$APP_STORE_CONNECT_API_KEY_ID" \
            api_issuer_id:"$APP_STORE_CONNECT_API_ISSUER_ID" \
            api_key_content:"$APP_STORE_CONNECT_API_KEY" \
            ipa:"build/export/Rosier.ipa" \
            skip_tests:true \
            skip_git:true

      - name: Upload to artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-store-build
          path: |
            ios/Rosier/build/export/Rosier.ipa
            ios/Rosier/build/Rosier.xcarchive
          retention-days: 90

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          artifacts: ios/Rosier/build/export/Rosier.ipa
          draft: false
          prerelease: false


