name: Backend CI

on:
  push:
    branches: [main, develop]
    paths: ['backend/**']
  pull_request:
    branches: [develop]
    paths: ['backend/**']

env:
  PYTHON_VERSION: '3.12'

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install ruff mypy
      - run: ruff check app/ --fix --unsafe-fixes || true
      - run: ruff check app/ || true
      - run: ruff format --check app/ || true
      - run: mypy app/ --ignore-missing-imports || true

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    if: always()
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rosier
          POSTGRES_PASSWORD: rosier_test
          POSTGRES_DB: rosier_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://rosier:rosier_test@localhost:5432/rosier_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: test-secret-key-do-not-use-in-production
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-asyncio pytest-cov httpx
      - run: alembic upgrade head
      - run: pytest tests/ -v --cov=app --cov-report=xml
      - uses: codecov/codecov-action@v4
        if: always()
        with:
          file: backend/coverage.xml

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: backend
          push: false
          tags: rosier-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: staging
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Get EC2 staging instance details
        id: ec2
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Environment,Values=staging" "Name=tag:Name,Values=rosier-api" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)

          PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)

          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "public_ip=$PUBLIC_IP" >> $GITHUB_OUTPUT

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ steps.ec2.outputs.public_ip }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to staging via SSH
        run: |
          ssh -i ~/.ssh/id_rsa ec2-user@${{ steps.ec2.outputs.public_ip }} << 'EOF'
          set -e
          cd /home/ec2-user/rosier
          git pull origin develop

          # Load environment variables
          set -a
          source .env.staging
          set +a

          # Pull latest Docker image
          docker-compose -f infra/docker/docker-compose-prod.yml pull api

          # Start services
          docker-compose -f infra/docker/docker-compose-prod.yml up -d api nginx

          # Run health check
          sleep 10
          curl -f http://localhost:8000/health || exit 1

          echo "Staging deployment successful"
          EOF

      - name: Run smoke tests
        run: |
          ssh -i ~/.ssh/id_rsa ec2-user@${{ steps.ec2.outputs.public_ip }} << 'EOF'
          set -e

          echo "Running smoke tests..."
          curl -f http://localhost:8000/health || exit 1
          curl -f http://localhost:8000/docs || exit 1

          echo "Smoke tests passed"
          EOF

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Get EC2 production instance details
        id: ec2
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Environment,Values=production" "Name=tag:Name,Values=rosier-api" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)

          PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)

          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "public_ip=$PUBLIC_IP" >> $GITHUB_OUTPUT

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ steps.ec2.outputs.public_ip }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to production via SSH
        run: |
          ssh -i ~/.ssh/id_rsa ec2-user@${{ steps.ec2.outputs.public_ip }} << 'EOF'
          set -e
          cd /home/ec2-user/rosier
          git pull origin main

          # Load environment variables
          set -a
          source .env
          set +a

          # Backup database before deployment
          echo "Backing up database..."
          docker-compose -f infra/docker/docker-compose-prod.yml exec -T api pg_dump $DATABASE_URL > /tmp/backup-$(date +%s).sql || true

          # Pull latest Docker image
          docker-compose -f infra/docker/docker-compose-prod.yml pull api

          # Start services
          docker-compose -f infra/docker/docker-compose-prod.yml up -d api nginx

          # Run migrations
          echo "Running database migrations..."
          docker-compose -f infra/docker/docker-compose-prod.yml exec -T api alembic upgrade head

          # Verify health
          sleep 10
          curl -f http://localhost:8000/health || exit 1

          echo "Production deployment successful"
          EOF

      - name: Run smoke tests
        run: |
          ssh -i ~/.ssh/id_rsa ec2-user@${{ steps.ec2.outputs.public_ip }} << 'EOF'
          set -e

          echo "Running smoke tests..."
          curl -f http://localhost:8000/health || exit 1
          curl -f http://localhost:8000/docs || exit 1

          # Test database connection
          docker-compose -f infra/docker/docker-compose-prod.yml exec -T api python -c "
          import os
          from sqlalchemy import create_engine, text
          engine = create_engine(os.getenv('DATABASE_URL'))
          with engine.connect() as conn:
              result = conn.execute(text('SELECT 1'))
              print('Database connection successful')
          "

          echo "Smoke tests passed"
          EOF

      - name: Create deployment annotation
        if: always()
        run: |
          echo "Production deployment completed"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"
          echo "Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
