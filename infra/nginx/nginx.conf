################################################################################
# ROSIER PRODUCTION NGINX CONFIGURATION
################################################################################
# Main Nginx configuration for Rosier
# Routes requests to different services based on domain/path
# Handles SSL termination, rate limiting, security headers, and caching
#
# Setup:
#   1. Place this file at /etc/nginx/nginx.conf
#   2. Configure SSL certificates via Let's Encrypt:
#      sudo certbot certonly --standalone -d rosier.app
#      sudo certbot certonly --standalone -d api.rosier.app
#      sudo certbot certonly --standalone -d mail.rosier.app
#      etc.
#   3. Test configuration: sudo nginx -t
#   4. Start Nginx: sudo systemctl start nginx
#
# Certificates will be at: /etc/letsencrypt/live/{domain}/
################################################################################

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ========================================================================
    # LOGGING
    # ========================================================================

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # ========================================================================
    # PERFORMANCE
    # ========================================================================

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    # Buffer sizes
    client_body_buffer_size 128k;
    client_max_body_size 10M;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;

    # Timeouts
    client_body_timeout 12;
    client_header_timeout 12;
    keepalive_timeout 15;
    send_timeout 10;

    # ========================================================================
    # RATE LIMITING
    # ========================================================================

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

    # ========================================================================
    # SECURITY HEADERS
    # ========================================================================

    # Common security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Strict Transport Security (enable only if using HTTPS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ========================================================================
    # UPSTREAM DEFINITIONS
    # ========================================================================

    # Backend API (FastAPI)
    upstream api_backend {
        least_conn;
        server api:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Listmonk (Email)
    upstream listmonk_service {
        least_conn;
        server listmonk:9000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # n8n (Workflow)
    upstream n8n_service {
        least_conn;
        server n8n:5678 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Mixpost (Social)
    upstream mixpost_service {
        least_conn;
        server mixpost:80 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Plausible (Analytics)
    upstream plausible_service {
        least_conn;
        server plausible:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ========================================================================
    # HTTP REDIRECT TO HTTPS
    # ========================================================================

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ========================================================================
    # ROSIER.APP - LANDING PAGE & MAIN SITE
    # ========================================================================

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name rosier.app www.rosier.app;

        # SSL certificates (configure via certbot)
        ssl_certificate /etc/letsencrypt/live/rosier.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/rosier.app/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/rosier.app/chain.pem;

        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Root location
        root /var/www/rosier;
        index index.html;

        # Rate limiting
        limit_req zone=general_limit burst=50 nodelay;

        # Security headers (additional)
        add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' https://plausible.io; img-src 'self' data: https:;" always;

        # Static files
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Logging
        access_log /var/log/nginx/rosier.app.access.log main;
        error_log /var/log/nginx/rosier.app.error.log warn;
    }

    # ========================================================================
    # API.ROSIER.APP - FASTAPI BACKEND
    # ========================================================================

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name api.rosier.app;

        # SSL certificates
        ssl_certificate /etc/letsencrypt/live/api.rosier.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.rosier.app/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/api.rosier.app/chain.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Rate limiting
        limit_req zone=api_limit burst=100 nodelay;

        # Logging
        access_log /var/log/nginx/api.rosier.app.access.log main;
        error_log /var/log/nginx/api.rosier.app.error.log warn;

        # Health check endpoint
        location /health {
            access_log off;
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
        }

        # API routes
        location / {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_set_header X-Request-ID $request_id;

            # Connection settings
            proxy_set_header Connection "";
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            # Redirect handling
            proxy_redirect off;
        }

        # WebSocket support for API
        location ~ ^/api/ws {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ========================================================================
    # MAIL.ROSIER.APP - LISTMONK EMAIL MARKETING
    # ========================================================================

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name mail.rosier.app;

        # SSL certificates
        ssl_certificate /etc/letsencrypt/live/mail.rosier.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mail.rosier.app/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Rate limiting
        limit_req zone=general_limit burst=50 nodelay;

        # Logging
        access_log /var/log/nginx/mail.rosier.app.access.log main;
        error_log /var/log/nginx/mail.rosier.app.error.log warn;

        location / {
            proxy_pass http://listmonk_service;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Connection "";
            proxy_redirect off;
        }
    }

    # ========================================================================
    # SOCIAL.ROSIER.APP - MIXPOST SOCIAL SCHEDULING
    # ========================================================================

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name social.rosier.app;

        # SSL certificates
        ssl_certificate /etc/letsencrypt/live/social.rosier.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/social.rosier.app/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Rate limiting
        limit_req zone=general_limit burst=50 nodelay;

        # Logging
        access_log /var/log/nginx/social.rosier.app.access.log main;
        error_log /var/log/nginx/social.rosier.app.error.log warn;

        location / {
            proxy_pass http://mixpost_service;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Connection "";
            proxy_redirect off;
        }
    }

    # ========================================================================
    # ANALYTICS.ROSIER.APP - PLAUSIBLE ANALYTICS
    # ========================================================================

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name analytics.rosier.app;

        # SSL certificates
        ssl_certificate /etc/letsencrypt/live/analytics.rosier.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/analytics.rosier.app/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Rate limiting
        limit_req zone=general_limit burst=50 nodelay;

        # Logging
        access_log /var/log/nginx/analytics.rosier.app.access.log main;
        error_log /var/log/nginx/analytics.rosier.app.error.log warn;

        location / {
            proxy_pass http://plausible_service;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Connection "";
            proxy_redirect off;
        }
    }

    # ========================================================================
    # N8N.ROSIER.APP - N8N WORKFLOW AUTOMATION (PASSWORD PROTECTED)
    # ========================================================================

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name n8n.rosier.app;

        # SSL certificates
        ssl_certificate /etc/letsencrypt/live/n8n.rosier.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/n8n.rosier.app/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Rate limiting
        limit_req zone=login_limit burst=10 nodelay;

        # Logging
        access_log /var/log/nginx/n8n.rosier.app.access.log main;
        error_log /var/log/nginx/n8n.rosier.app.error.log warn;

        # Basic authentication (optional, set via htpasswd)
        # Create with: htpasswd -c /etc/nginx/.htpasswd admin
        auth_basic "n8n Restricted Access";
        auth_basic_user_file /etc/nginx/.htpasswd;

        location / {
            proxy_pass http://n8n_service;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_redirect off;
        }
    }

    # ========================================================================
    # FALLBACK
    # ========================================================================

    server {
        listen 80;
        listen [::]:80;
        server_name _;
        return 444;
    }
}
