# SwiftLint Configuration for Rosier

# List of rules to enable
enabled_rules:
  - empty_count
  - empty_parameters
  - empty_parentheses_with_trailing_closure
  - enum_case_associated_values_count
  - fatal_error_message
  - file_length
  - force_cast
  - force_try
  - force_unwrap
  - implicitly_unwrapped_optional
  - legacy_cggeometry_functions
  - legacy_constant
  - legacy_constructor
  - legacy_nsgeometry_functions
  - line_length
  - missing_docs
  - number_separator
  - opening_brace
  - operator_usage_whitespace
  - todo
  - trailing_closure
  - type_body_length
  - vertical_whitespace
  - void_return

# List of rules to exclude from analysis
excluded:
  - Tests/
  - DerivedData/
  - Carthage/
  - Pods/

# Rule configurations
force_cast: warning
force_try: warning
force_unwrap: warning

line_length:
  warning: 150
  error: 200
  ignores_function_declarations: true
  ignores_comments: true

file_length:
  warning: 500
  error: 1000

implicitly_unwrapped_optional: warning

trailing_whitespace:
  severity: warning

type_body_length:
  warning: 300
  error: 400

number_separator:
  minimum_length: 5

missing_docs:
  severity: warning

todo: warning

vertical_whitespace:
  max_blank_lines: 2

opening_brace:
  allow_multiline_func: true

# Custom rules
custom_rules:
  no_print_in_production:
    name: "No Print in Production"
    regex: "print\\("
    message: "Avoid using print() - use logging framework instead"
    severity: warning
    excluded: "Tests/"
    match_kinds: call

# Analyzer settings
analyzer_rules:
  - capture_variable
  - capture_all
  - unused_import

# Disable integration tests for now
integration_tests:
  enabled: false

# Reporter
reporter: "xcode"
