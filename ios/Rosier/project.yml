name: Rosier
options:
  bundleIdPrefix: com.rosier
  developmentLanguage: en
  deploymentTarget:
    iOS: '17.0'
  xcodeVersion: '16.0'
  createIntermediateGroups: true

attributes:
  BuildIndependentTargetsInParallel: true

settings:
  PRODUCT_BUNDLE_IDENTIFIER: com.rosier.app
  CURRENT_PROJECT_VERSION: 1
  MARKETING_VERSION: 1.0.0
  IPHONEOS_DEPLOYMENT_TARGET: '17.0'
  SWIFT_VERSION: '5.9'
  SWIFT_COMPILATION_MODE: wholemodule
  CODE_SIGN_ENTITLEMENTS: Sources/App/Rosier.entitlements
  INFOPLIST_FILE: Sources/App/Info.plist
  INFOPLIST_OUTPUT_FORMAT: xml
  GENERATE_INFOPLIST_FILE: 'YES'
  ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  ASSETCATALOG_COMPILER_LAUNCHIMAGE_NAME: LaunchImage
  DEVELOPMENT_TEAM:
  ARCHS: arm64
  VALID_ARCHS: arm64
  EXCLUDED_ARCHS[sdk=iphonesimulator*]: 'i386 arm64e'
  ENABLE_BITCODE: 'NO'
  SWIFT_STRICT_CONCURRENCY: complete
  CLANG_ANALYZER_NONNULL: 'YES'
  CLANG_ANALYZER_NULLABILITY_COMPLETENESS: 'YES'
  GCC_WARN_ABOUT_RETURN_TYPE: 'YES_ERROR'
  GCC_WARN_UNUSED_VARIABLE: 'YES'
  CLANG_WARN_EMPTY_BODY: 'YES'
  OTHER_LDFLAGS: '$(inherited)'
  LD_RUNPATH_SEARCH_PATHS: '$(inherited) @executable_path/Frameworks'

buildSettings:
  Debug:
    DEBUG_OPTIMIZATION_LEVEL: '-Onone'
    DEBUG_INFORMATION_FORMAT: dwarf
    OTHER_SWIFT_FLAGS: '-D DEBUG'
    CODE_SIGN_IDENTITY: 'iPhone Developer'
    PROVISIONING_PROFILE_SPECIFIER: ''
  Release:
    RELEASE_OPTIMIZATION_LEVEL: '-O'
    RELEASE_INFORMATION_FORMAT: 'dwarf-with-dsym'
    OTHER_SWIFT_FLAGS: '-O -whole-module-optimization'
    CODE_SIGN_IDENTITY: 'iPhone Distribution'
    STRIP_INSTALLED_PRODUCT: 'YES'
    COPY_PHASE_STRIP: 'YES'
    DEPLOYMENT_POSTPROCESSING: 'YES'
    VALIDATE_WORKSPACE: 'YES'
    VALIDATE_PRODUCT: 'YES'

targets:
  Rosier:
    type: application
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - path: Sources
        excludes:
          - App/Resources
    resources:
      - path: Sources/App/Resources
        buildPhase: resources
      - path: Sources/Resources
        buildPhase: resources
      - path: Resources
        buildPhase: resources
    frameworks:
      - UIKit
      - CoreData
      - CloudKit
      - UserNotifications
      - BackgroundTasks
    info:
      path: Sources/App/Info.plist
      useBase64: false
    entitlements:
      path: Sources/App/Rosier.entitlements
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.rosier.app
      PRODUCT_NAME: Rosier
      EXECUTABLE_NAME: Rosier
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: 1.0.0
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: 'Apple Distribution'
      PROVISIONING_PROFILE_SPECIFIER: 'Rosier App Store'
    capabilities:
      pushNotifications:
        enabled: true
      backgroundModes:
        - fetch
        - processing
        - remoteNotification
      signInWithApple:
        enabled: true
      associatedDomains:
        - applinks:rosier.app
        - webcredentials:rosier.app
    scheme:
      testTargets:
        - RosierTests
      buildAction:
        preActions: []
        postActions: []
      testAction:
        targets:
          - RosierTests
      runAction:
        executable: Rosier
        arguments:
          environmentVariables: {}
      profileAction:
        executable: Rosier
      archiveAction:
        customArchiveName: Rosier

  RosierTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - path: Tests/RosierTests
        includes:
          - '**/*.swift'
    dependencies:
      - target: Rosier
    settings:
      BUNDLE_LOADER: '$(TEST_HOST)'
      TEST_HOST: '$(BUILT_PRODUCTS_DIR)/Rosier.app/Rosier'

schemes:
  Rosier:
    build:
      targets:
        Rosier: all
    run:
      config: Debug
      executable: Rosier
    test:
      config: Debug
      targets:
        - RosierTests
      coverage: true
      codeCoverageTargets:
        - Rosier
    archive:
      config: Release
      customArchiveName: Rosier
      revealArchiveInOrganizer: true
    profile:
      config: Release
      executable: Rosier

aggregateTargets:
  RosierScreenshots:
    buildScript: |
      echo "Screenshot generation placeholder"
      exit 0
