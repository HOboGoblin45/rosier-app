version: '3.8'

services:
  # PostgreSQL Database for Testing
  postgres:
    image: postgres:16-alpine
    container_name: rosier-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rosier_test
    ports:
      - "5433:5432"  # Different port to avoid conflicts
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rosier-test-network

  # Redis Cache for Testing
  redis:
    image: redis:7-alpine
    container_name: rosier-redis-test
    ports:
      - "6380:6379"  # Different port
    volumes:
      - redis_test_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rosier-test-network

  # Elasticsearch for Testing
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    container_name: rosier-elasticsearch-test
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9201:9200"  # Different port
    volumes:
      - elasticsearch_test_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 | grep -q 'You Know, for Search'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rosier-test-network

  # Test Runner Container
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rosier-test-runner
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/rosier_test
      REDIS_URL: redis://redis:6379/1
      ELASTICSEARCH_URL: http://elasticsearch:9200
      JWT_SECRET_KEY: test-secret-key-change-in-production
      ENVIRONMENT: testing
      SENTRY_DSN: ""
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - .:/app
      - test_coverage:/app/coverage
    networks:
      - rosier-test-network
    command: >
      bash -c "
        alembic upgrade head &&
        pytest tests/ -v --cov=app --cov-report=html --cov-report=term-missing --cov-report=xml
      "

volumes:
  postgres_test_data:
  redis_test_data:
  elasticsearch_test_data:
  test_coverage:

networks:
  rosier-test-network:
    driver: bridge
